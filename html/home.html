<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grille HTML accessible</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <main>
    <h1>Grille 5 x 3</h1>
    <p>Cette page presente une grille HTML de 5 colonnes et 3 lignes.</p>

    <table>
      <caption>Representation tabulaire d'une grille 5 x 3</caption>
      <thead>
        <tr>
          <th scope="col">Colonne 1</th>
          <th scope="col">Colonne 2</th>
          <th scope="col">Colonne 3</th>
          <th scope="col">Colonne 4</th>
          <th scope="col">Colonne 5</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td aria-label="Ligne 1, colonne 1">1</td>
          <td aria-label="Ligne 1, colonne 2">2</td>
          <td aria-label="Ligne 1, colonne 3">3</td>
          <td aria-label="Ligne 1, colonne 4">4</td>
          <td aria-label="Ligne 1, colonne 5">5</td>
        </tr>
        <tr>
          <td aria-label="Ligne 2, colonne 1">6</td>
          <td aria-label="Ligne 2, colonne 2">7</td>
          <td aria-label="Ligne 2, colonne 3">8</td>
          <td aria-label="Ligne 2, colonne 4">9</td>
          <td aria-label="Ligne 2, colonne 5">10</td>
        </tr>
        <tr>
          <td aria-label="Ligne 3, colonne 1">11</td>
          <td aria-label="Ligne 3, colonne 2">12</td>
          <td aria-label="Ligne 3, colonne 3">13</td>
          <td aria-label="Ligne 3, colonne 4">14</td>
          <td aria-label="Ligne 3, colonne 5">15</td>
        </tr>
      </tbody>
    </table>
  </main>
</body>
</html>
